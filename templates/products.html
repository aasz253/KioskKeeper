{% extends "base.html" %}
{% block title %}Products - KioskKeeper{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Products</h1>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Product</button>
</div>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search products..." oninput="loadProducts()">
    <select id="categoryFilter" onchange="loadProducts()">
        <option value="">All Categories</option>
        {% for cat in categories %}
        <option value="{{ cat }}">{{ cat }}</option>
        {% endfor %}
    </select>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Unit Price</th>
                <th>Reorder</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="productTable">
        </tbody>
    </table>
</div>

<div class="mobile-cards" id="productCards"></div>

<div id="productModal" class="modal-overlay" style="display:none;">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Add Product</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <form id="productForm" onsubmit="saveProduct(event)">
            <input type="hidden" id="productId">
            <div class="form-group">
                <label for="productName">Name</label>
                <input type="text" id="productName" required>
            </div>
            <div class="form-group">
                <label for="productCategory">Category</label>
                <select id="productCategory" required>
                    {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="productQuantity">Quantity</label>
                    <input type="number" id="productQuantity" min="0" value="0" required>
                </div>
                <div class="form-group">
                    <label for="productPrice">Unit Price (KSh)</label>
                    <input type="number" id="productPrice" step="0.01" min="0" required>
                </div>
            </div>
            <div class="form-group">
                <label for="productReorder">Reorder Level</label>
                <input type="number" id="productReorder" min="0" value="5" required>
            </div>
            <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1rem;">
                <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadProducts() {
    const search = document.getElementById('searchInput').value;
    const category = document.getElementById('categoryFilter').value;
    const params = new URLSearchParams({ search, category });
    const res = await fetch(`/api/products?${params}`);
    const products = await res.json();
    const tbody = document.getElementById('productTable');
    const cards = document.getElementById('productCards');
    if (!products.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No products found</td></tr>';
        cards.innerHTML = '<div class="empty-state">No products found</div>';
        return;
    }
    tbody.innerHTML = products.map(p => `
        <tr class="${p.is_low_stock ? 'low-stock' : ''}">
            <td>${p.name}</td>
            <td>${p.category}</td>
            <td>${p.quantity}</td>
            <td>KSh${p.unit_price.toFixed(2)}</td>
            <td>${p.reorder_level}</td>
            <td>${p.is_low_stock ? '<span style="color:var(--danger);font-weight:600;">LOW</span>' : '<span style="color:var(--success);">OK</span>'}</td>
            <td class="actions">
                <button class="btn btn-sm btn-outline" onclick='openEditModal(${JSON.stringify(p)})'>Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
            </td>
        </tr>
    `).join('');
    cards.innerHTML = products.map(p => `
        <div class="mobile-card ${p.is_low_stock ? 'low-stock' : ''}">
            <div class="mobile-card-row"><span class="label">Name</span><span class="val">${p.name}</span></div>
            <div class="mobile-card-row"><span class="label">Category</span><span class="val">${p.category}</span></div>
            <div class="mobile-card-row"><span class="label">Quantity</span><span class="val">${p.quantity}</span></div>
            <div class="mobile-card-row"><span class="label">Price</span><span class="val">KSh${p.unit_price.toFixed(2)}</span></div>
            <div class="mobile-card-row"><span class="label">Reorder</span><span class="val">${p.reorder_level}</span></div>
            <div class="mobile-card-row"><span class="label">Status</span><span class="val">${p.is_low_stock ? '<span style="color:var(--danger);font-weight:600;">LOW</span>' : '<span style="color:var(--success);">OK</span>'}</span></div>
            <div class="mobile-card-actions">
                <button class="btn btn-sm btn-outline" onclick='openEditModal(${JSON.stringify(p)})'>Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
            </div>
        </div>
    `).join('');
}

function openAddModal() {
    document.getElementById('modalTitle').textContent = 'Add Product';
    document.getElementById('productForm').reset();
    document.getElementById('productId').value = '';
    document.getElementById('productModal').style.display = 'flex';
}

function openEditModal(p) {
    document.getElementById('modalTitle').textContent = 'Edit Product';
    document.getElementById('productId').value = p.id;
    document.getElementById('productName').value = p.name;
    document.getElementById('productCategory').value = p.category;
    document.getElementById('productQuantity').value = p.quantity;
    document.getElementById('productPrice').value = p.unit_price;
    document.getElementById('productReorder').value = p.reorder_level;
    document.getElementById('productModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('productModal').style.display = 'none';
}

async function saveProduct(e) {
    e.preventDefault();
    const id = document.getElementById('productId').value;
    const data = {
        name: document.getElementById('productName').value,
        category: document.getElementById('productCategory').value,
        quantity: parseInt(document.getElementById('productQuantity').value),
        unit_price: parseFloat(document.getElementById('productPrice').value),
        reorder_level: parseInt(document.getElementById('productReorder').value),
    };
    const method = id ? 'PUT' : 'POST';
    const url = id ? `/api/products/${id}` : '/api/products';
    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    if (res.ok) {
        closeModal();
        loadProducts();
        showToast(id ? 'Product updated' : 'Product added');
    } else {
        const err = await res.json();
        showToast(err.error || 'Error', true);
    }
}

async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    const res = await fetch(`/api/products/${id}`, { method: 'DELETE' });
    if (res.ok) { loadProducts(); showToast('Product deleted'); }
}

document.getElementById('productModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

document.addEventListener('DOMContentLoaded', loadProducts);
</script>
{% endblock %}
