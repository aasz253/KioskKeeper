<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="description" content="Offline inventory management for small kiosk and shop owners">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="KioskKeeper">
    <title>{% block title %}KioskKeeper{% endblock %}</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">KioskKeeper</a>
        </div>
        <button class="nav-toggle" onclick="toggleNav()">☰</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a></li>
            <li><a href="/products" class="{% if request.path == '/products' %}active{% endif %}">Products</a></li>
            <li><a href="/transactions" class="{% if request.path == '/transactions' %}active{% endif %}">Transactions</a></li>
            <li><a href="/reports" class="{% if request.path == '/reports' %}active{% endif %}">Reports</a></li>
        </ul>
        <button class="dark-toggle" onclick="toggleDark()" title="Toggle Dark Mode">🌙</button>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>&copy; <span id="copyYear"></span> sifunacodex. All rights reserved.</p>
    </footer>
    <div id="toast" class="toast hidden"></div>
    <script>document.getElementById('copyYear').textContent = new Date().getFullYear();</script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
