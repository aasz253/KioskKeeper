{% extends "base.html" %}
{% block title %}Transactions - KioskKeeper{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Transactions</h1>
    <button class="btn btn-primary" onclick="openTransactionModal()">+ Record Transaction</button>
</div>

<div class="filter-row">
    <select id="filterProduct" onchange="loadTransactions()">
        <option value="">All Products</option>
        {% for p in products %}
        <option value="{{ p.id }}">{{ p.name }}</option>
        {% endfor %}
    </select>
    <select id="filterType" onchange="loadTransactions()">
        <option value="">All Types</option>
        <option value="sale">Sales</option>
        <option value="restock">Restocks</option>
    </select>
    <input type="date" id="filterDate" onchange="loadTransactions()">
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Product</th>
                <th>Type</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody id="transactionTable">
        </tbody>
    </table>
</div>

<div class="mobile-cards" id="transactionCards"></div>

<div id="transactionModal" class="modal-overlay" style="display:none;">
    <div class="modal">
        <div class="modal-header">
            <h3>Record Transaction</h3>
            <button class="modal-close" onclick="closeTransactionModal()">&times;</button>
        </div>
        <form id="transactionForm" onsubmit="saveTransaction(event)">
            <div class="form-group">
                <label for="transProduct">Product</label>
                <select id="transProduct" required>
                    {% for p in products %}
                    <option value="{{ p.id }}">{{ p.name }} ({{ p.quantity }} in stock)</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="transType">Type</label>
                <select id="transType" required>
                    <option value="sale">Sale (reduce stock)</option>
                    <option value="restock">Restock (add stock)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="transQuantity">Quantity</label>
                <input type="number" id="transQuantity" min="1" value="1" required>
            </div>
            <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:1rem;">
                <button type="button" class="btn btn-outline" onclick="closeTransactionModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Record</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadTransactions() {
    const params = new URLSearchParams();
    const product = document.getElementById('filterProduct').value;
    const type = document.getElementById('filterType').value;
    const date = document.getElementById('filterDate').value;
    if (product) params.set('product_id', product);
    if (type) params.set('type', type);
    if (date) params.set('date', date);
    const res = await fetch(`/api/transactions?${params}`);
    const transactions = await res.json();
    const tbody = document.getElementById('transactionTable');
    const cards = document.getElementById('transactionCards');
    if (!transactions.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No transactions found</td></tr>';
        cards.innerHTML = '<div class="empty-state">No transactions found</div>';
        return;
    }
    tbody.innerHTML = transactions.map(t => `
        <tr>
            <td>${new Date(t.date).toLocaleString()}</td>
            <td>${t.product_name}</td>
            <td><span style="color:${t.type === 'sale' ? 'var(--danger)' : 'var(--success)'};font-weight:600;">${t.type === 'sale' ? 'Sale' : 'Restock'}</span></td>
            <td>${t.quantity}</td>
        </tr>
    `).join('');
    cards.innerHTML = transactions.map(t => `
        <div class="mobile-card">
            <div class="mobile-card-row"><span class="label">Date</span><span class="val">${new Date(t.date).toLocaleString()}</span></div>
            <div class="mobile-card-row"><span class="label">Product</span><span class="val">${t.product_name}</span></div>
            <div class="mobile-card-row"><span class="label">Type</span><span class="val" style="color:${t.type === 'sale' ? 'var(--danger)' : 'var(--success)'};font-weight:600;">${t.type === 'sale' ? 'Sale' : 'Restock'}</span></div>
            <div class="mobile-card-row"><span class="label">Quantity</span><span class="val">${t.quantity}</span></div>
        </div>
    `).join('');
}

function openTransactionModal() {
    document.getElementById('transactionModal').style.display = 'flex';
}

function closeTransactionModal() {
    document.getElementById('transactionModal').style.display = 'none';
}

async function saveTransaction(e) {
    e.preventDefault();
    const data = {
        product_id: parseInt(document.getElementById('transProduct').value),
        type: document.getElementById('transType').value,
        quantity: parseInt(document.getElementById('transQuantity').value),
    };
    const res = await fetch('/api/transactions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
    });
    if (res.ok) {
        closeTransactionModal();
        loadTransactions();
        showToast('Transaction recorded');
    } else {
        const err = await res.json();
        showToast(err.error || 'Error', true);
    }
}

document.getElementById('transactionModal').addEventListener('click', function(e) {
    if (e.target === this) closeTransactionModal();
});

document.addEventListener('DOMContentLoaded', loadTransactions);
</script>
{% endblock %}
